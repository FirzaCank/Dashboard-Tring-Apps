version: 2

sources:
  - name: appsflyer_raw
    database: "{{ env_var('GCP_PROJECT', 'dashboard-tring-dev') }}"
    schema: appsflyer_raw
    tables:
      - name: raw_installs
        description: "Verbatim installs from AppsFlyer installs_report/v5. All columns STRING."
        freshness:
          warn_after: {count: 25, period: hour}
          error_after: {count: 49, period: hour}
        loaded_at_field: _ingested_at

      - name: raw_in_app_events
        description: "Verbatim in-app events from AppsFlyer in_app_events_report/v5."
        freshness:
          warn_after: {count: 25, period: hour}
          error_after: {count: 49, period: hour}
        loaded_at_field: _ingested_at

      - name: raw_blocked_installs
        description: "Verbatim blocked installs from AppsFlyer blocked_installs_report/v5."
        freshness:
          warn_after: {count: 25, period: hour}
          error_after: {count: 49, period: hour}
        loaded_at_field: _ingested_at

      - name: raw_campaign_performance
        description: "Verbatim aggregated data from AppsFlyer master-agg-data/v4."
        freshness:
          warn_after: {count: 25, period: hour}
          error_after: {count: 49, period: hour}
        loaded_at_field: _ingested_at
