steps:
  - name: "python:3.12-slim"
    id: lint
    entrypoint: bash
    args:
      - -c
      - |
        pip install uv --quiet
        cd ingestion
        uv sync --quiet
        uv run ruff check src/ tests/
        uv run ruff format --check src/ tests/

  - name: "python:3.12-slim"
    id: test
    entrypoint: bash
    args:
      - -c
      - |
        pip install uv --quiet
        cd ingestion
        uv sync --quiet
        uv run pytest tests/ -v
    env:
      - "GCP_PROJECT=ci-placeholder"

  - name: "ghcr.io/dbt-labs/dbt-bigquery:1.8.2"
    id: dbt-parse
    entrypoint: dbt
    args: ["parse", "--profiles-dir", "."]
    dir: transform
    env:
      - "GCP_PROJECT=ci-placeholder"

# No Terraform step: infra/ is reference-only and not part of the deploy path
# (provisioning is via gcloud, see docs/gcp-setup.md). If the client adopts
# Terraform later, add a `terraform validate` step here.

options:
  logging: CLOUD_LOGGING_ONLY
